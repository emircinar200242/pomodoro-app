<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ff6b6b">
<title>🍅 Pomodoro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Bebas+Neue&display=swap');

:root {
  --work-a:   #ff6b6b;
  --work-b:   #ff8e53;
  --break-a:  #43e97b;
  --break-b:  #38f9d7;
  --long-a:   #4facfe;
  --long-b:   #a18cd1;

  --bg:       #1a1a2e;
  --card:     rgba(255,255,255,0.06);
  --text:     #fff;
  --subtext:  rgba(255,255,255,0.55);
  --radius:   24px;

  --ca: var(--work-a);
  --cb: var(--work-b);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  font-family: 'Nunito', sans-serif;
}

body {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: max(env(safe-area-inset-top), 16px) 20px max(env(safe-area-inset-bottom), 16px);
  position: relative;
  transition: background 0.6s ease;
}

/* Animated blobs */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.18;
  pointer-events: none;
  transition: background 0.6s;
  animation: blobFloat 8s ease-in-out infinite;
}
.blob1 { width:300px; height:300px; top:-80px; left:-80px; background: var(--ca); animation-delay:0s; }
.blob2 { width:250px; height:250px; bottom:-60px; right:-60px; background: var(--cb); animation-delay:-4s; }

@keyframes blobFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  50%      { transform: translate(20px, 20px) scale(1.08); }
}

/* MODE TABS */
.tabs {
  display: flex;
  gap: 8px;
  background: rgba(255,255,255,0.07);
  border-radius: 50px;
  padding: 5px;
  margin-bottom: 20px;
  width: 100%;
  max-width: 360px;
  flex-shrink: 0;
}

.tab {
  flex: 1;
  padding: 8px 4px;
  border: none;
  border-radius: 50px;
  background: transparent;
  color: var(--subtext);
  font-family: 'Nunito', sans-serif;
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.3s;
}

.tab.active {
  background: linear-gradient(135deg, var(--ca), var(--cb));
  color: #fff;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* MAIN CARD */
.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.1);
  width: 100%;
  max-width: 360px;
  padding: 32px 24px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  backdrop-filter: blur(20px);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--ca), var(--cb));
  border-radius: var(--radius) var(--radius) 0 0;
}

/* Session label */
.session-label {
  font-size: 0.65rem;
  font-weight: 900;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--ca), var(--cb));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

/* CIRCLE TIMER */
.timer-wrap {
  position: relative;
  width: 220px;
  height: 220px;
  margin: 16px 0 24px;
}

.timer-svg {
  width: 220px;
  height: 220px;
  transform: rotate(-90deg);
}

.timer-track {
  fill: none;
  stroke: rgba(255,255,255,0.07);
  stroke-width: 10;
}

.timer-prog {
  fill: none;
  stroke: url(#timerGrad);
  stroke-width: 10;
  stroke-linecap: round;
  stroke-dasharray: 628;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear;
  filter: drop-shadow(0 0 8px var(--ca));
}

.timer-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.timer-time {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4.5rem;
  color: #fff;
  letter-spacing: 0.05em;
  line-height: 1;
  text-shadow: 0 0 30px rgba(255,255,255,0.2);
}

.timer-session {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--subtext);
  margin-top: 4px;
}

/* Pomodoro dots */
.pomo-dots {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}

.pomo-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.15);
  transition: all 0.3s;
}

.pomo-dot.done {
  background: linear-gradient(135deg, var(--ca), var(--cb));
  border-color: transparent;
  box-shadow: 0 0 8px var(--ca);
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 16px;
  align-items: center;
}

.btn-secondary {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--subtext);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  transition: all 0.2s;
}
.btn-secondary:active { transform: scale(0.92); background: rgba(255,255,255,0.15); }

.btn-primary {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--ca), var(--cb));
  border: none;
  color: #fff;
  font-size: 1.8rem;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.3), 0 0 20px var(--ca);
  transition: all 0.2s;
}
.btn-primary:active { transform: scale(0.93); }

/* STATS STRIP */
.stats-strip {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: 360px;
  margin-top: 16px;
  flex-shrink: 0;
}

.stat-card {
  flex: 1;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 14px 10px;
  text-align: center;
  backdrop-filter: blur(10px);
}

.stat-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  background: linear-gradient(135deg, var(--ca), var(--cb));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

.stat-lbl {
  font-size: 0.5rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  color: var(--subtext);
  margin-top: 4px;
  text-transform: uppercase;
}

/* Motivasyon mesajı */
.motivation {
  margin-top: 14px;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--subtext);
  text-align: center;
  min-height: 1.2em;
  max-width: 320px;
  flex-shrink: 0;
  transition: opacity 0.4s;
}

/* Pulse anim when running */
@keyframes pulse-ring {
  0%   { transform: scale(1);   opacity:0.4; }
  100% { transform: scale(1.15); opacity:0; }
}
.running .timer-wrap::after {
  content:'';
  position:absolute; inset:-10px;
  border-radius:50%;
  border: 2px solid var(--ca);
  animation: pulse-ring 1.5s ease-out infinite;
}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- Mode tabs -->
<div class="tabs">
  <button class="tab active" data-mode="work">🍅 Odak</button>
  <button class="tab" data-mode="break">☕ Kısa Mola</button>
  <button class="tab" data-mode="long">🌙 Uzun Mola</button>
</div>

<!-- Main card -->
<div class="card" id="main-card">
  <div class="session-label" id="session-label">ODAK ZAMANI</div>

  <div class="timer-wrap" id="timer-wrap">
    <svg class="timer-svg" viewBox="0 0 220 220">
      <defs>
        <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" id="grad-stop1" stop-color="#ff6b6b"/>
          <stop offset="100%" id="grad-stop2" stop-color="#ff8e53"/>
        </linearGradient>
      </defs>
      <circle class="timer-track" cx="110" cy="110" r="100"/>
      <circle class="timer-prog" id="timer-prog" cx="110" cy="110" r="100"/>
    </svg>
    <div class="timer-center">
      <div class="timer-time" id="timer-time">25:00</div>
      <div class="timer-session" id="timer-sub">Hazır</div>
    </div>
  </div>

  <div class="pomo-dots" id="pomo-dots">
    <div class="pomo-dot"></div>
    <div class="pomo-dot"></div>
    <div class="pomo-dot"></div>
    <div class="pomo-dot"></div>
  </div>

  <div class="controls">
    <button class="btn-secondary" id="btn-skip" title="Atla">⏭</button>
    <button class="btn-primary" id="btn-play">▶</button>
    <button class="btn-secondary" id="btn-reset" title="Sıfırla">↺</button>
  </div>
</div>

<!-- Stats -->
<div class="stats-strip">
  <div class="stat-card">
    <div class="stat-val" id="stat-today">0</div>
    <div class="stat-lbl">Bugün</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="stat-total">0</div>
    <div class="stat-lbl">Toplam</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="stat-streak">0</div>
    <div class="stat-lbl">Seri 🔥</div>
  </div>
</div>

<div class="motivation" id="motivation">Odaklan ve başar! 💪</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const MODES = {
  work:  { label:'ODAK ZAMANI',  sub:'Çalışıyor',  mins:25, ca:'#ff6b6b', cb:'#ff8e53', theme:'#ff6b6b' },
  break: { label:'KISA MOLA',    sub:'Dinleniyor', mins:5,  ca:'#43e97b', cb:'#38f9d7', theme:'#43e97b' },
  long:  { label:'UZUN MOLA',    sub:'Dinleniyor', mins:15, ca:'#4facfe', cb:'#a18cd1', theme:'#4facfe' },
};

const MOTIVATIONS = [
  'Odaklan ve başar! 💪', 'Harika gidiyorsun! 🚀',
  'Her dakika sayılır ⏰', 'Sen yapabilirsin! ✨',
  'Akış halinde 🌊', 'Bir adım daha! 🏆',
  'Mola hak ettirdin ☕', 'Dinlenme zamanı 🌿',
];

// ── STATE ────────────────────────────────────────────────
let mode = 'work';
let totalSecs, remaining, running = false, timer = null;
let pomoCount = 0, todayCount = 0, totalCount = 0, streak = 0;

// ── DOM ──────────────────────────────────────────────────
const timeEl    = document.getElementById('timer-time');
const subEl     = document.getElementById('timer-sub');
const labelEl   = document.getElementById('session-label');
const progEl    = document.getElementById('timer-prog');
const wrapEl    = document.getElementById('timer-wrap');
const dotsEl    = document.getElementById('pomo-dots');
const playBtn   = document.getElementById('btn-play');
const skipBtn   = document.getElementById('btn-skip');
const resetBtn  = document.getElementById('btn-reset');
const motivEl   = document.getElementById('motivation');
const stop1     = document.getElementById('grad-stop1');
const stop2     = document.getElementById('grad-stop2');

// ── INIT ─────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  const cfg = MODES[m];
  totalSecs = remaining = cfg.mins * 60;
  running = false;
  clearInterval(timer);
  playBtn.textContent = '▶';
  wrapEl.classList.remove('running');

  // Colors
  document.documentElement.style.setProperty('--ca', cfg.ca);
  document.documentElement.style.setProperty('--cb', cfg.cb);
  stop1.setAttribute('stop-color', cfg.ca);
  stop2.setAttribute('stop-color', cfg.cb);
  document.querySelector('meta[name=theme-color]').content = cfg.theme;

  // Labels
  labelEl.textContent = cfg.label;
  subEl.textContent = 'Hazır';

  // Tabs
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.mode === m));

  render();
  motivEl.textContent = MOTIVATIONS[Math.floor(Math.random() * MOTIVATIONS.length)];
}

function render() {
  const m = String(Math.floor(remaining / 60)).padStart(2, '0');
  const s = String(remaining % 60).padStart(2, '0');
  timeEl.textContent = `${m}:${s}`;

  // Circle progress
  const pct = remaining / totalSecs;
  const circ = 2 * Math.PI * 100; // r=100
  progEl.style.strokeDashoffset = circ * (1 - pct);

  // Dots
  const dots = dotsEl.querySelectorAll('.pomo-dot');
  dots.forEach((d, i) => d.classList.toggle('done', i < pomoCount));

  // Stats
  document.getElementById('stat-today').textContent = todayCount;
  document.getElementById('stat-total').textContent = totalCount;
  document.getElementById('stat-streak').textContent = streak;
}

function tick() {
  if (remaining <= 0) {
    complete(); return;
  }
  remaining--;
  render();
}

function complete() {
  clearInterval(timer);
  running = false;
  playBtn.textContent = '▶';
  wrapEl.classList.remove('running');
  subEl.textContent = 'Tamamlandı! 🎉';

  // Vibrate
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

  // Play beep
  playBeep();

  if (mode === 'work') {
    pomoCount = (pomoCount % 4) + 1;
    todayCount++;
    totalCount++;
    streak++;
    render();
    // Auto-switch to break
    setTimeout(() => {
      if (pomoCount % 4 === 0) setMode('long');
      else setMode('break');
    }, 1500);
  } else {
    setTimeout(() => setMode('work'), 1500);
  }
}

function togglePlay() {
  if (running) {
    clearInterval(timer);
    running = false;
    playBtn.textContent = '▶';
    subEl.textContent = 'Duraklatıldı';
    wrapEl.classList.remove('running');
  } else {
    running = true;
    playBtn.textContent = '⏸';
    subEl.textContent = MODES[mode].sub;
    wrapEl.classList.add('running');
    timer = setInterval(tick, 1000);
    motivEl.textContent = MOTIVATIONS[Math.floor(Math.random() * MOTIVATIONS.length)];
  }
}

// ── BEEP ─────────────────────────────────────────────────
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.3, 0.6].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = mode === 'work' ? 880 : 660;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.4, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.4);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.4);
    });
  } catch(e) {}
}

// ── EVENTS ───────────────────────────────────────────────
playBtn.addEventListener('click', togglePlay);

resetBtn.addEventListener('click', () => {
  clearInterval(timer); running = false;
  playBtn.textContent = '▶';
  wrapEl.classList.remove('running');
  remaining = totalSecs;
  subEl.textContent = 'Hazır';
  render();
});

skipBtn.addEventListener('click', () => {
  clearInterval(timer); running = false;
  wrapEl.classList.remove('running');
  if (mode === 'work') {
    pomoCount = (pomoCount % 4) + 1;
    if (pomoCount % 4 === 0) setMode('long');
    else setMode('break');
  } else {
    setMode('work');
  }
});

document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => {
    clearInterval(timer);
    setMode(t.dataset.mode);
  })
);

// ── START ────────────────────────────────────────────────
setMode('work');
</script>
</body>
</html>
